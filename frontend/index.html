<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="wrapper">
        <form id="loginForm">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" id="username" name="username" placeholder="Username" aria-label="Username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="Password" aria-label="Password"
                    autocomplete="current-password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="remember" name="remember">Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="register-link">
                <p>Don't have any account? <a href="#">Register</a></p>
            </div>

            <div class="social-icons">
                <a href="#" aria-label="Login with Apple">
                    <i class='bx bxl-apple'></i>
                </a>
                <a href="#" aria-label="Login with Google">
                    <i class='bx bxl-google'></i>
                </a>
                <a href="#" aria-label="Login with Facebook">
                    <i class='bx bxl-facebook'></i>
                </a>
                <a href="#" aria-label="Login with LinkedIn">
                    <i class='bx bxl-linkedin'></i>
                </a>
                <a href="#" aria-label="Login with GitHub">
                    <i class='bx bxl-github'></i>
                </a>
            </div>
        </form>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
